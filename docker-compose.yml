version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: pca_postgres
    environment:
      POSTGRES_DB: pca_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pca-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
  
  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: pca_redis
    ports:
      - "6379:6379"
    networks:
      - pca-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
  
  # Student API Backend
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: pca_backend
    ports:
      - "8000:8080"
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_DATABASE: pca_local
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
    env_file: 
      - ./backend/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pca-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  # Public + Student Portal Frontend
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pca_frontend
    ports:
      - "8001:8080"
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_DATABASE: pca_local
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
    env_file:
      - ./frontend/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - pca-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  # Admin API Backend
  admin-backend:
    build: 
      context: ./admin-backend
      dockerfile: Dockerfile
    container_name: pca_admin_backend
    ports:
      - "8002:8080"
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_DATABASE: pca_local
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
    env_file:
      - ./admin-backend/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pca-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  # Admin Panel Frontend
  admin-frontend:
    build: 
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: pca_admin_frontend
    ports:
      - "8003:8080"
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_DATABASE: pca_local
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
    env_file:
      - ./admin-frontend/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      admin-backend:
        condition: service_healthy
    networks:
      - pca-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local

# Network for inter-service communication
networks:
  pca-network:
    driver: bridge